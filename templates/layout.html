<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NVD CVE Database Explorer{% endblock %}</title>
    <!-- Fix the CSS link path with proper url_for -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>NVD CVE Database Explorer</h1>
        </header>
        
        {% block content %}{% endblock %}
        
        <footer>
            <p>&copy; {{ now().year }} NVD CVE Database Explorer</p>
        </footer>
    </div>
</body>
</html>
